<section class="templates-page">
  <header class="hero-card templates-hero">
    <div>
      <span class="eyebrow">Biblioteca de formatos</span>
      <h1 class="templates-hero__title" style="margin: 0.9rem 0 0.35rem; font-size: clamp(1.85rem, 3.2vw, 2.5rem); line-height: 1.05; font-weight: 400; letter-spacing: -0.03em; color: #0f172a;">
        Plantillas
      </h1>
      <p class="templates-hero__subtitle" style="margin: 0; font-size: 1.15rem; font-weight: 600; color: #475569;">
        Descargue los formatos oficiales del programa.
      </p>
    </div>
  </header>

  <mat-card class="search-card">
    <mat-card-content>
      <div class="field">
        <label class="field__label">Buscar plantilla</label>
        <div class="search-wrapper">
          <input class="field__input" type="text" placeholder="Buscar por nombre o categoría"
            [ngModel]="search()" (ngModelChange)="search.set($event)" />
          <mat-icon class="search-icon">search</mat-icon>
        </div>
      </div>
    </mat-card-content>
  </mat-card>

  <p class="section-label">Formatos disponibles</p>

  <div class="templates-grid">
    @for (p of filteredPlantillas(); track p.titulo) {
      <article class="template-card">
        <div class="template-icon" [ngClass]="getIconBg(p.formato)">
          {{ getIconEmoji(p.formato) }}
        </div>

        <h2>{{ p.titulo }}</h2>
        <p class="template-description">{{ p.descripcion }}</p>

        <div class="template-footer">
          <span class="template-badge" [ngClass]="getFormatoBadge(p.formato)">
            {{ p.formato }}
          </span>
          <button type="button" class="template-button">
            <svg class="template-button__icon" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1M12 12v6m0 0l-3-3m3 3l3-3M12 4v8"/>
            </svg>
            Descargar
          </button>
        </div>
      </article>
    }
  </div>
</section>
