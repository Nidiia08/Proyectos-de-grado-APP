<div class="password-shell">
  <section class="password-card">
    <h1>Cambio obligatorio de contrasena</h1>
    <p>
      Este es tu primer ingreso como Estudiante, Docente o Jurado. Para continuar debes cambiar tu
      contrasena usando la actual.
    </p>

    <form (ngSubmit)="submit()" class="password-form">
      <label>
        Contrasena actual
        <input
          type="password"
          name="passwordActual"
          [(ngModel)]="passwordActual"
          autocomplete="current-password"
          required
        />
      </label>

      <label>
        Nueva contrasena
        <input
          type="password"
          name="passwordNuevo"
          [(ngModel)]="passwordNuevo"
          autocomplete="new-password"
          minlength="8"
          required
        />
      </label>

      <label>
        Confirmar nueva contrasena
        <input
          type="password"
          name="confirmarPassword"
          [(ngModel)]="confirmarPassword"
          autocomplete="new-password"
          minlength="8"
          required
        />
      </label>

      <button type="submit" [disabled]="cargando">
        {{ cargando ? 'Actualizando...' : 'Cambiar contrasena' }}
      </button>
    </form>

    @if (error) {
      <p class="feedback feedback--error">{{ error }}</p>
    }

    @if (mensaje) {
      <p class="feedback feedback--ok">{{ mensaje }}</p>
    }
  </section>
</div>
