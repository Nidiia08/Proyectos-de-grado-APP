services:
  db:
    image: postgres:16
    container_name: trabajos_grado_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ProyectosdeGrado_API/proyectos_grado_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - trabajos_grado_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: trabajos_grado_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - ./ProyectosdeGrado_API/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trabajos_grado_network

  api:
    build:
      context: ./ProyectosdeGrado_API
      dockerfile: Dockerfile
    container_name: trabajos_grado_api
    restart: always
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./ProyectosdeGrado_API/app:/app
    ports:
      - "8000:8000"
    env_file:
      - ./ProyectosdeGrado_API/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - trabajos_grado_network

  web:
    build:
      context: ./ProyectosdeGrado_WEB
      dockerfile: Dockerfile
    container_name: trabajos_grado_web
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - api
    networks:
      - trabajos_grado_network

volumes:
  postgres_data:

networks:
  trabajos_grado_network:
    driver: bridge
